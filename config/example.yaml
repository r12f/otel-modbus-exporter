# modbus-exporter configuration example
# See spec/config.md for full schema documentation.

global_labels:
  env: production
  site: factory-1

logging:
  level: info
  output: syslog
  syslog_facility: daemon

exporters:
  otlp:
    enabled: true
    endpoint: "http://localhost:4318"
    timeout: "10s"
    headers:
      Authorization: "Bearer changeme"
  prometheus:
    enabled: true
    listen: "0.0.0.0:9090"
    path: "/metrics"

collectors:
  - name: solar_inverter
    protocol:
      type: tcp
      endpoint: "192.168.1.10:502"
    slave_id: 1
    polling_interval: "5s"
    labels:
      location: rooftop
    metrics:
      - name: dc_voltage
        description: "DC input voltage"
        type: gauge
        register_type: holding
        address: 100
        data_type: f32
        byte_order: big_endian
        scale: 0.1
        offset: 0.0
        unit: "V"
      - name: energy_total
        description: "Total energy produced"
        type: counter
        register_type: holding
        address: 200
        data_type: u32
        byte_order: big_endian
        scale: 0.01
        offset: 0.0
        unit: "kWh"

  - name: power_meter
    protocol:
      type: rtu
      device: "/dev/ttyUSB0"
      bps: 19200
      data_bits: 8
      stop_bits: 1
      parity: even
    slave_id: 2
    polling_interval: "10s"
    metrics:
      - name: grid_power
        description: "Active grid power"
        type: gauge
        register_type: input
        address: 0
        data_type: i32
        byte_order: big_endian
        scale: 1.0
        offset: 0.0
        unit: "W"
      - name: relay_status
        description: "Relay coil status"
        type: gauge
        register_type: coil
        address: 0
        data_type: bool
