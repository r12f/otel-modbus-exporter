services:
  modbus-simulator:
    image: oitc/modbus-server
    command: ["-f", "/server_config.json"]
    volumes:
      - ./config/modbus-simulator.json:/server_config.json:ro
    ports:
      - "5020:5020"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.connect((\"localhost\", 5020)); s.close()'"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  otel-modbus-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config/test.yaml:/etc/otel-modbus-exporter/config.yaml:ro
    ports:
      - "9090:9090"
    depends_on:
      modbus-simulator:
        condition: service_healthy
